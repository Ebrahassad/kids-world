name: kids_world
description: Kids World Puzzle Game
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  confetti: ^0.7.0
  shared_preferences: ^2.5.3
  google_mobile_ads: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/Puzzle/
    - assets/sounds/
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"


flutter_native_splash:

  color: "#87CEEB"

  image: assets/icon/app_icon.png

  android: true
  ios: true

  android_12:
    image: assets/icon/app_icon.png
    color: "#87CEEB"