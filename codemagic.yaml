workflows:
  android-workflow:
    name: Android Build

    environment:
      flutter: stable

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Generate App Icon
        script: |
          dart run flutter_launcher_icons

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk